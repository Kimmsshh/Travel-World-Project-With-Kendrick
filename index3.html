<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>List Menu With Icons</title>


    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: black;
            padding: 40px;
        }

        h2{
            margin-bottom: 20px;
            color: #333;
        }

     

        .menu-ul{
            list-style: none;
            width: 260px;
            margin-bottom: 50px;
        }

        .menu-ul li{
            background: white;
            margin: 12px 0;
            padding: 15px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .menu-ul li:hover{
            background: #0083b0;
            transform: translateX(5px);
        }

        .menu-ul li a{
            color: black;
            text-decoration: none;
            font-size: 18px;
            display: block;
        }

        .menu-ul li i{
            margin-right: 10px;
        }



        .menu-ol{
            list-style: none;
            width: 260px;
        }

        .menu-ol li{
            background: whitesmoke;
            margin: 12px 0;
            padding: 15px;
            border-left: 5px solid #00b4db;
            border-radius: 10px;
            font-size: 18px;
            transition: 0.3s;
        }

        .menu-ol li:hover{
            background: #e8faff;
            transform: scale(1.03);
        }

        .menu-ol li i{
            color: #00b4db;
            margin-right: 10px;
        }

    </style>
</head>

<body>

   
    <h2>Menu UL</h2>

    <ul class="menu-ul">

        <li>
            <a href="#">
                <i class="fa-solid fa-house"></i>
                Home
            </a>
        </li>

        <li>
            <a href="#">
                <i class="fa-solid fa-circle-info"></i>
                About
            </a>
        </li>

        <li>
            <a href="#">
                <i class="fa-solid fa-address-book"></i>
                Contact
            </a>
        </li>

        <li>
            <a href="#">
                <i class="fa-solid fa-gear"></i>
                Setting
            </a>
        </li>

    </ul>



    
    <h2>Menu OL</h2>

    <ol class="menu-ol">

        <li>
            <i class="fa-solid fa-house"></i>
            Home
        </li>

        <li>
            <i class="fa-solid fa-circle-info"></i>
            About
        </li>

        <li>
            <i class="fa-solid fa-address-book"></i>
            Contact
        </li>

        <li>
            <i class="fa-solid fa-gear"></i>
            Setting
        </li>

    </ol>

</body>
</html>
